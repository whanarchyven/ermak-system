name: ermak

networks:
  ermak-net:
    driver: bridge

volumes:
  convex-data:

services:
  backend:
    image: ghcr.io/get-convex/convex-backend:latest
    stop_grace_period: 10s
    stop_signal: SIGINT
    ports:
      - "${CONVEX_PORT:-3210}:3210"
      - "${CONVEX_SITE_PORT:-3211}:3211"
    volumes:
      - convex-data:/convex/data
    environment:
      - INSTANCE_NAME=${INSTANCE_NAME:-ermak}
      - INSTANCE_SECRET=${INSTANCE_SECRET:-4f5e6d7c8b9a0a1b2c3d4e5f60718293a4b5c6d7e8f90a1b2c3d4e5f60718293}
      - CONVEX_CLOUD_ORIGIN=${CONVEX_CLOUD_ORIGIN:-http://localhost:3210}
      - CONVEX_SITE_ORIGIN=${CONVEX_SITE_ORIGIN:-http://localhost:3211}
      - DISABLE_BEACON=true
      - RUST_LOG=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3210/version"]
      interval: 5s
      start_period: 10s
      timeout: 5s
      retries: 10
    networks: [ermak-net]

  dashboard:
    image: ghcr.io/get-convex/convex-dashboard:latest
    stop_grace_period: 10s
    stop_signal: SIGINT
    ports:
      - "${DASHBOARD_PORT:-6791}:6791"
    environment:
      - NEXT_PUBLIC_DEPLOYMENT_URL=${CONVEX_CLOUD_ORIGIN:-http://localhost:3210}
    depends_on:
      backend:
        condition: service_healthy
    networks: [ermak-net]

  deployer:
    build:
      context: .
      dockerfile: docker/Dockerfile.deployer
    environment:
      - CONVEX_SELF_HOSTED_URL=http://backend:3210
      - CONVEX_SELF_HOSTED_ADMIN_KEY=${CONVEX_SELF_HOSTED_ADMIN_KEY:-}
      - CONVEX_AUTH_SITE_URL=${SITE_URL:-http://localhost:3001}
      - SEED_ADMIN_EMAIL=${SEED_ADMIN_EMAIL:-admin@ermak.local}
      - SEED_ADMIN_PASSWORD=${SEED_ADMIN_PASSWORD:-admin123}
      - DEPLOY_MODE=prod
    depends_on:
      backend:
        condition: service_healthy
    restart: "no"
    networks: [ermak-net]

  erp:
    build:
      context: .
      dockerfile: docker/Dockerfile.erp
      target: runner
      args:
        - NEXT_PUBLIC_CONVEX_URL=${PUBLIC_CONVEX_URL:-http://localhost:3210}
    environment:
      - NEXT_PUBLIC_CONVEX_URL=${PUBLIC_CONVEX_URL:-http://localhost:3210}
      - CONVEX_BACKEND_HOST=backend
    ports:
      - "${ERP_PORT:-3000}:3000"
    depends_on:
      deployer:
        condition: service_completed_successfully
    networks: [ermak-net]

  pwa:
    build:
      context: .
      dockerfile: docker/Dockerfile.pwa
      target: runner
      args:
        - NEXT_PUBLIC_CONVEX_URL=${PUBLIC_CONVEX_URL:-http://localhost:3210}
    environment:
      - NEXT_PUBLIC_CONVEX_URL=${PUBLIC_CONVEX_URL:-http://localhost:3210}
    ports:
      - "${PWA_PORT:-3001}:3001"
    depends_on:
      deployer:
        condition: service_completed_successfully
    networks: [ermak-net]
